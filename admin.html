<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - BSPHCL</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 30px;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .admin-header {
            text-align: center; 
            margin-bottom: 40px;
            color: #1e3a8a;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .btn {
            padding: 12px 24px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #1e40af;
        }
        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }
        .message.success {
            background-color: #d1fae5;
            color: #065f46;
        }
        .message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>BSPHCL Admin Panel</h1>
            <p>Add Notifications</p>
        </div>

        <div id="message" class="message"></div>

        <h2>Add New Notification</h2>
        <form id="notificationForm">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description"></textarea>
            </div>
            <div class="form-group">
                <label>Link *</label>
                <input type="url" id="link" required>
            </div>
            <div class="form-group">
                <label>Date *</label>
                <input type="datetime-local" id="date" required>
            </div>
            <button type="submit" class="btn">Add Notification</button>
        </form>

        <div style="margin-top: 30px;">
            <a href="index.html" class="btn">Back to Home</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8081/api';

        function showMessage(text) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message success show';
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 3000);
        }

        document.getElementById('notificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                link: document.getElementById('link').value,
                notificationDate: document.getElementById('date').value,

                active: true
            };

            try {
                const response = await fetch(`${API_URL}/notifications`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showMessage('Notification added successfully!');
                    e.target.reset();
                }
            } catch (error) {
                alert('Error: Make sure backend is running!');
            }
        });
    </script>
</body>
</html>
